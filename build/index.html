<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/tools.ico">
    <title>在线工具站</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #88cfde;
            --primary-dark: #66a7bd;
            --background-dark: #050505;
            --card-dark: #1e2532;
            --card-hover: #2c3545;
            --text-primary: #ecf0f1;
            --text-secondary: #bdc3c7;
            --border-color: rgba(136, 207, 222, 0.15);
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 0%, #1a2236 0%, #050505 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #121825;
        }

        .logo img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            vertical-align: middle;
        }

        .button-icon img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
            max-width: 900px;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0px 30px 0px;
        }

        .logo {
            font-size: 2.4rem;
            background: linear-gradient(90deg, #65a6bc, #87cfde);
            -webkit-background-clip: text;
            text-shadow: 0 0 20px rgba(136, 207, 222, 0.3);
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 20px; /* Add some space between logo and title */
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0; /* Remove bottom margin from h1 */
            background: linear-gradient(90deg, #65a6bc, #87cfde);
            -webkit-background-clip: text;
            text-shadow: 0 0 20px rgba(136, 207, 222, 0.3);
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #2d3b4e;
            border-radius: 50px;
            background: #080a0f;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .search-input:focus {
            background: #0f141c;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(15, 20, 28, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 40px rgba(102, 167, 189, 0.05), 0 20px 40px rgba(0,0,0,0.6);
            max-height: 70vh;
            overflow-y: auto;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            background: var(--card-dark);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            min-height: 140px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .nav-button:hover::before {
            left: 100%;
        }

        .nav-button:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(136, 207, 222, 0.15);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .button-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #65a6bc, #87cfde);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .button-text {
            font-size: 1.1rem;
            text-align: center;
        }

        .button-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
            text-align: center;
        }

        .footer {
            margin-top: auto; /* Push footer to the bottom */
            padding: 10px 0 0 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .button-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .logo {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            .button-container {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
        }

        /* 滚动条美化 */
        .container::-webkit-scrollbar {
            width: 10px;
        }

        .container::-webkit-scrollbar-track {
            background: #080a0f;
            border-radius: 10px;
        }

        .container::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .container::-webkit-scrollbar-thumb:hover {
            background: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-container">
            <div class="logo">
                <img src="assets/tools.png" alt="Tools Icon">
            </div>
            <h1>在线工具站</h1>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" placeholder="搜索工具...">
            <i class="fas fa-search search-icon"></i>
        </div>
    </div>

    <div class="container">
        <div class="button-container">
            <a href="manbo" class="nav-button">
                <div class="button-icon">
                    <img src="assets/manbo.ico" alt="icon">
                </div>
                <div class="button-text">曼波配音生成器</div>
                <div class="button-desc">AI语音生成工具</div>
            </a>
            
            <a href="ranking" class="nav-button">
                <div class="button-icon">
                    <img src="assets/hang.png" alt="icon">
                </div>
                <div class="button-text">从夯到拉排行榜</div>
                <div class="button-desc">图表模板工具</div>
            </a>
            
            <a href="rhyme" class="nav-button">
                <div class="button-icon">
                    <img src="assets/rhyme.ico" alt="icon">
                </div>
                <div class="button-text">押韵助手</div>
                <div class="button-desc">通过关键词生成押韵词汇</div>
            </a>

            <a href="https://dreamifly.com/zh" class="nav-button" target="_blank">
                <div class="button-icon">
                    <img src="https://cn.cravatar.com/favicon/api/index.php?url=https://dreamifly.com/zh" alt="icon">
                </div>
                <div class="button-text"> AI绘画</div>
                <div class="button-desc">一个免费的AI绘画在线生成工具（友链）</div>
            </a>

            
            <a href="https://www.icoconverter.com/" class="nav-button" target="_blank">
                <div class="button-icon">
                    <img src="https://cn.cravatar.com/favicon/api/index.php?url=https://www.icoconverter.com/" alt="icon">
                </div>
                <div class="button-text">ICO图标转换工具</div>
                <div class="button-desc">在线图标转换（第三方）</div>
            </a>

            <a href="https://docsmall.com/image-compress" class="nav-button" target="_blank">
                <div class="button-icon">
                    <img src="https://cn.cravatar.com/favicon/api/index.php?url=https://docsmall.com/image-compress" alt="icon">
                </div>
                <div class="button-text">图片压缩工具</div>
                <div class="button-desc">在线图片压缩（第三方）</div>
            </a>
            
            <a href="https://squoosh.app/" class="nav-button" target="_blank">
                <div class="button-icon">
                    <img src="https://cn.cravatar.com/favicon/api/index.php?url=https://squoosh.app/" alt="icon">
                </div>
                <div class="button-text">图片压缩工具</div>
                <div class="button-desc">在线图片压缩，谷歌开发的（第三方）</div>
            </a>

            <a href="https://snapany.com/zh" class="nav-button" target="_blank">
                <div class="button-icon">
                    <img src="https://cn.cravatar.com/favicon/api/index.php?url=https://snapany.com/zh" alt="icon">
                </div>
                <div class="button-text">万能视频/图片解析下载</div>
                <div class="button-desc">多平台视频/图片提取工具（第三方）</div>
            </a>

            <!-- 可以继续添加更多按钮 -->
             
            <a href="#" class="nav-button" target="_blank">
                <div class="button-icon">
                    <i class="fas fa-plus"></i>
                </div>
                <div class="button-text">更多工具</div>
                <div class="button-desc">敬请期待</div>
            </a>
        </div>
    </div>

    <div class="footer">
        <a href="https://contact.dayun.cool" target="_blank" style="color: #999; text-decoration: none; padding: 0 12px; border-right: 1px solid #66666666; transition: color 0.3s ease;" onmouseover="this.style.color='#88cfde'" onmouseout="this.style.color='#999'">问题反馈</a>
        <span style="color: #999; padding-left: 12px; border-right: 1px solid #66666666; padding-right: 15px;"><span style="padding-right: 15px; border-right: 1px solid #66666666;">© 2025-2026 大沄</span><a href='https://space.bilibili.com/192702710' target='_blank' style='color: inherit; text-decoration: none; transition: color 0.3s ease; padding-left: 15px;' onmouseover="this.style.color='#88cfde'" onmouseout="this.style.color='inherit'">bilibili</a></span>
        <span style="color: #999; padding-left: 12px;">持续更新中v1.2.3</span>
    </div>

    <script>
        // 搜索功能
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.querySelector('.search-input');
            const navButtons = document.querySelectorAll('.nav-button');
            
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                
                navButtons.forEach(button => {
                    const buttonText = button.querySelector('.button-text').textContent.toLowerCase();
                    const buttonDesc = button.querySelector('.button-desc').textContent.toLowerCase();
                    
                    if (buttonText.includes(searchTerm) || buttonDesc.includes(searchTerm)) {
                        button.style.display = 'flex';
                    } else {
                        button.style.display = 'none';
                    }
                });
            });
            
            // 添加点击动画效果
            navButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href === '#') {
                        e.preventDefault();
                    }
                    
                    // 添加点击动画
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 150);
                });
            });
        });
    </script>
</body>
</html>
