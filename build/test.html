<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/manbo.ico">
  <title>曼波配音生成器</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── 自定义滚动条 ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222222; }
    ::-webkit-scrollbar-thumb:hover { background: #444444; }

    /* Firefox */
    * { scrollbar-width: thin; scrollbar-color: #222222 transparent; }

    body {
      background: #000000;
      color: #bbbbbb;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.875rem;
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 容器 ── */
    .panel {
      background: #111111;
      border: 1px solid #222222;
      padding: 3.5rem 3.5rem 3rem;
      width: 100%;
      max-width: 680px;
      margin: 4rem 2rem;
    }

    /* ── 标题 ── */
    .panel-title {
      font-size: 0.9rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #aaaaaa;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #1a1a1a;
      text-align: center;
    }

    /* ── 表单区域 ── */
    .field {
      margin-bottom: 2rem;
    }

    .field-label {
      display: block;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999999;
      margin-bottom: 0.6rem;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      max-height: 280px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #444444;
      color: #dddddd;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.9rem;
      line-height: 1.8;
      resize: none;
      padding: 0.4rem 0;
      outline: none;
      transition: border-color 0.4s ease;
      overflow-y: auto;
    }

    textarea::placeholder {
      color: #555555;
    }

    textarea:focus {
      border-bottom-color: #777777;
    }

    /* ── API Key ── */
    .key-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    input[type="password"],
    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #444444;
      color: #dddddd;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8rem;
      padding: 0.4rem 0;
      outline: none;
      transition: border-color 0.4s ease;
    }

    input::placeholder {
      color: #555555;
    }

    input:focus {
      border-bottom-color: #777777;
    }

    .toggle-vis {
      background: none;
      border: 1px solid #444444;
      color: #999999;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .toggle-vis:hover {
      border-color: #777777;
      color: #cccccc;
    }

    /* ── 字符计数 ── */
    .char-count {
      text-align: right;
      font-size: 0.7rem;
      color: #555555;
      margin-top: 0.4rem;
      font-family: 'Cascadia Code', 'Consolas', monospace;
    }

    .char-count.warn { color: #aa3333; }

    /* ── 提交按钮 ── */
    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid #444444;
      color: #cccccc;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      padding: 0.85rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.4s ease;
      position: relative;
    }

    .btn:hover:not(:disabled) {
      border-color: #888888;
      color: #ffffff;
    }

    .btn:active:not(:disabled) {
      border-color: #aaaaaa;
      color: #ffffff;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* 加载动画 */
    .btn.loading::after {
      content: '';
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border: 1px solid #555555;
      border-top-color: #aaaaaa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    /* ── 提示文本（按钮下方）── */
    .msg {
      font-size: 0.72rem;
      color: #444444;
      margin-top: 0.7rem;
      min-height: 1.2rem;
      text-align: center;
      transition: color 0.4s ease;
    }

    .msg.ok   { color: #5a9966; }
    .msg.err  { color: #aa3333; }

    /* ── 音频播放器（自定义）── */
    .audio-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #2a2a2a;
      display: none;
    }

    .audio-section.visible {
      display: block;
    }

    .audio-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666666;
      margin-bottom: 0.8rem;
    }

    .waveform-wrap {
      position: relative;
      height: 48px;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      margin-bottom: 0.8rem;
      cursor: pointer;
      overflow: hidden;
    }

    .waveform-progress {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: rgba(136, 136, 136, 0.08);
      pointer-events: none;
      transition: width 0.1s linear;
    }

    .waveform-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .audio-ctrl-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .play-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid #444444;
      color: #aaaaaa;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .play-btn:hover {
      border-color: #888888;
      color: #ffffff;
    }

    .time-display {
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.7rem;
      color: #666666;
      white-space: nowrap;
      min-width: 80px;
    }

    /* ── 底部状态 ── */
    .footer {
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .health-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666666;
    }

    .health-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333333;
      transition: background 0.4s ease;
    }

    .health-dot.ok  { background: #5a9966; }
    .health-dot.err { background: #aa3333; }

    /* ── 下载按钮 ── */
    .btn-download {
      background: transparent;
      border: 1px solid #444444;
      color: #888888;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      transition: all 0.4s ease;
      display: none;
      margin-left: auto;
    }

    .btn-download.visible {
      display: block;
    }

    .btn-download:hover {
      border-color: #666666;
      color: #bbbbbb;
    }

    /* ── 打赏按钮 ── */
    .donate-btn {
      background: transparent;
      border: 1px solid #333333;
      color: #666666;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .donate-btn:hover {
      border-color: #888888;
      color: #bbbbbb;
    }

    /* ── 打赏图片遮罩 ── */
    .donate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .donate-overlay.visible {
      display: flex;
    }

    .donate-overlay img {
      max-width: 90%;
      max-height: 90%;
      border: 1px solid #333333;
    }

    .donate-overlay .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: 1px solid #444444;
      color: #888888;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .donate-overlay .close-btn:hover {
      border-color: #888888;
      color: #cccccc;
    }
  </style>
</head>
<body>

<div class="panel">

  <h1 class="panel-title">曼波配音生成器</h1>

  <!-- 输入文本 -->
  <div class="field">
    <label class="field-label" for="textInput">待合成文本</label>
    <textarea
      id="textInput"
      placeholder="在此输入文本，最多 800 字…"
      maxlength="800"
      spellcheck="false"
    ></textarea>
    <div class="char-count" id="charCount">0 / 800</div>
  </div>

  <!-- API Key -->
  <div class="field">
    <label class="field-label" for="apiKeyInput">API Key</label>
    <div class="key-row">
      <input
        type="password"
        id="apiKeyInput"
        placeholder="输入你的 API Key"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="toggle-vis" id="toggleKey" type="button">显示</button>
    </div>
  </div>

  <!-- 提交 -->
  <button class="btn" id="synthBtn" type="button">合成语音</button>

  <!-- 提示 -->
  <div class="msg" id="msgBox"></div>

  <!-- 音频播放 -->
  <div class="audio-section" id="audioSection">
    <div class="audio-label">生成的音频 （请及时保存，刷新后将丢失）</div>
    <div class="waveform-wrap" id="waveformWrap" title="点击播放/暂停">
      <div class="waveform-progress" id="waveformProgress"></div>
      <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
    </div>
    <div class="audio-ctrl-row">
      <button class="play-btn" id="playBtn">&#9654;</button>
      <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
      <button class="btn-download" id="downloadBtn" type="button">下载</button>
    </div>
    <audio id="audioPlayer" style="display:none;"></audio>
  </div>

  <!-- 底部状态 -->
  <div class="footer">
    <div class="health-status">
      <div class="health-dot" id="healthDot"></div>
      <span id="healthText">检测服务…</span>
    </div>
    <button class="donate-btn" id="donateBtn" type="button">为作者充电❤️</button>
  </div>

</div>

<!-- 打赏图片遮罩 -->
<div class="donate-overlay" id="donateOverlay">
  <button class="close-btn" id="closeDonateBtn" type="button">关闭</button>
  <img src="assets/1.jpg" alt="充电二维码">
</div>

<script>
  // ── 元素引用 ──
  const textInput   = document.getElementById('textInput');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const toggleKey   = document.getElementById('toggleKey');
  const synthBtn    = document.getElementById('synthBtn');
  const msgBox      = document.getElementById('msgBox');
  const audioSection = document.getElementById('audioSection');
  const audioPlayer    = document.getElementById('audioPlayer');
  const downloadBtn    = document.getElementById('downloadBtn');
  const charCount      = document.getElementById('charCount');
  const healthDot      = document.getElementById('healthDot');
  const healthText     = document.getElementById('healthText');
  const waveformWrap   = document.getElementById('waveformWrap');
  const waveformCanvas = document.getElementById('waveformCanvas');
  const waveformProg   = document.getElementById('waveformProgress');
  const playBtn         = document.getElementById('playBtn');
  const timeDisplay    = document.getElementById('timeDisplay');

  let currentBlob = null;

  const API_BASE = 'https://api.h473fd122.nyat.app:41939';

  // ── 读取保存的 API Key ──
  const savedKey = localStorage.getItem('gsv_apikey');
  if (savedKey) apiKeyInput.value = savedKey;

  apiKeyInput.addEventListener('input', () => {
    localStorage.setItem('gsv_apikey', apiKeyInput.value);
  });

  // ── 健康检查 ──
  async function checkHealth() {
    try {
      const resp = await fetch(`${API_BASE}/health`);
      const data = await resp.json();
      healthDot.className = 'health-dot ok';
      healthText.textContent = data.status === 'ok' ? '服务正常' : '服务异常';
    } catch {
      healthDot.className = 'health-dot err';
      healthText.textContent = '服务离线';
    }
  }

  checkHealth();
  setInterval(checkHealth, 30000);

  // ── 字符计数 ──
  function updateCharCount() {
    const n = textInput.value.length;
    charCount.textContent = `${n} / 800`;
    charCount.className = 'char-count' + (n > 750 ? ' warn' : '');
  }

  textInput.addEventListener('input', updateCharCount);

  // ── 显示/隐藏 Key ──
  let keyVisible = false;
  toggleKey.addEventListener('click', () => {
    keyVisible = !keyVisible;
    apiKeyInput.type = keyVisible ? 'text' : 'password';
    toggleKey.textContent = keyVisible ? '隐藏' : '显示';
  });

  // ── 合成 ──
  function setMsg(text, type = '') {
    msgBox.textContent = text;
    msgBox.className = 'msg' + (type ? ' ' + type : '');
  }

  synthBtn.addEventListener('click', async () => {
    const text = textInput.value.trim();
    const key  = apiKeyInput.value.trim();

    if (!text) {
      setMsg('请输入待合成的文本', 'err');
      return;
    }
    if (text.length > 800) {
      setMsg('文本不能超过 800 字', 'err');
      return;
    }
    if (!key) {
      setMsg('请输入 API Key', 'err');
      return;
    }

    // 状态：加载中
    synthBtn.disabled   = true;
    synthBtn.classList.add('loading');
    synthBtn.textContent = '合成中…（速度受字数和排队人数影响）';
    setMsg('');
    audioSection.classList.remove('visible');
    downloadBtn.classList.remove('visible');

    try {
      const resp = await fetch(`${API_BASE}/tts`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-API-Key': key,
        },
        body: JSON.stringify({ text }),
      });

      if (resp.status === 401) {
        setMsg('认证失败，请检查 API Key', 'err');
        return;
      }
      if (resp.status === 400) {
        let body = '';
        try { body = await resp.json(); } catch { /* ignore */ }
        setMsg(body.error || '参数错误', 'err');
        return;
      }
      if (!resp.ok) {
        setMsg(`合成失败 (${resp.status})`, 'err');
        return;
      }

      const blob = await resp.blob();
      currentBlob = blob;

      const url = URL.createObjectURL(blob);
      audioPlayer.src = url;
      audioSection.classList.add('visible');
      downloadBtn.classList.add('visible');
      setMsg('合成完成', 'ok');
      drawWaveform(url);

    } catch (e) {
      setMsg('网络错误，请确认服务已启动', 'err');
    } finally {
      synthBtn.disabled   = false;
      synthBtn.classList.remove('loading');
      synthBtn.textContent = '合成语音';
    }
  });

  // ── 下载 ──
  downloadBtn.addEventListener('click', () => {
    if (!currentBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(currentBlob);
    a.download = 'tts_output.wav';
    a.click();
  });

  // ── 回车快捷键（Ctrl+Enter 提交）──
  textInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      synthBtn.click();
    }
  });

  // ── 自动聚焦到文本框 ──
  textInput.focus();

  // ── 波形图绘制 ──
  function drawWaveform(url) {
    const ctx = waveformCanvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = waveformWrap.offsetWidth;
    const H = 48;
    waveformCanvas.width  = W * dpr;
    waveformCanvas.height = H * dpr;
    waveformCanvas.style.width  = W + 'px';
    waveformCanvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    const offscreen = new AudioContext();
    fetch(url)
      .then(r => r.arrayBuffer())
      .then(buf => offscreen.decodeAudioData(buf))
      .then(decoded => {
        const data  = decoded.getChannelData(0);
        const step  = Math.ceil(data.length / W);
        const cH    = H / 2;
        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = '#555555';
        ctx.lineWidth   = 1;
        for (let x = 0; x < W; x++) {
          let min =  1, max = -1;
          for (let j = 0; j < step; j++) {
            const v = data[x * step + j] || 0;
            if (v < min) min = v;
            if (v > max) max = v;
          }
          ctx.beginPath();
          ctx.moveTo(x, cH + min * cH * 0.9);
          ctx.lineTo(x, cH + max * cH * 0.9);
          ctx.stroke();
        }
      })
      .catch(() => {});
  }

  // ── 播放控制 ──
  let isPlaying = false;

  function fmt(s) {
    if (isNaN(s) || !isFinite(s)) return '00:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  playBtn.addEventListener('click', () => {
    if (!audioPlayer.src) return;
    if (isPlaying) {
      audioPlayer.pause();
      isPlaying = false;
      playBtn.innerHTML = '&#9654;';
    } else {
      audioPlayer.play();
      isPlaying = true;
      playBtn.innerHTML = '&#10074;&#10074;';
    }
  });

  audioPlayer.addEventListener('play',  () => { isPlaying = true;  playBtn.innerHTML = '&#10074;&#10074;'; });
  audioPlayer.addEventListener('pause', () => { isPlaying = false; playBtn.innerHTML = '&#9654;'; });
  audioPlayer.addEventListener('ended', () => {
    isPlaying = false;
    playBtn.innerHTML = '&#9654;';
    waveformProg.style.width = '0';
  });

  audioPlayer.addEventListener('timeupdate', () => {
    if (!audioPlayer.duration) return;
    const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
    waveformProg.style.width = pct + '%';
    timeDisplay.textContent = fmt(audioPlayer.currentTime) + ' / ' + fmt(audioPlayer.duration);
  });

  audioPlayer.addEventListener('loadedmetadata', () => {
    timeDisplay.textContent = '00:00 / ' + fmt(audioPlayer.duration);
  });

  waveformWrap.addEventListener('click', (e) => {
    if (!audioPlayer.src || !audioPlayer.duration) return;
    const rect = waveformWrap.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    audioPlayer.currentTime = pct * audioPlayer.duration;
  });

  // ── 打赏 ──
  const donateBtn      = document.getElementById('donateBtn');
  const donateOverlay  = document.getElementById('donateOverlay');
  const closeDonateBtn = document.getElementById('closeDonateBtn');

  donateBtn.addEventListener('click', () => {
    donateOverlay.classList.add('visible');
  });

  closeDonateBtn.addEventListener('click', () => {
    donateOverlay.classList.remove('visible');
  });

  donateOverlay.addEventListener('click', (e) => {
    if (e.target === donateOverlay) {
      donateOverlay.classList.remove('visible');
    }
  });
</script>

</body>
</html>
